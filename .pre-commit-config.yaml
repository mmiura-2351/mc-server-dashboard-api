# Pre-commit hooks for code quality
# See https://pre-commit.com for more information

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      # Run the formatter
      - id: ruff-format
        types_or: [python, pyi]

  # Test execution — see docs/TESTING.md §4 for the layered strategy.
  # pre-commit: unit smoke (excludes slow) — fast feedback before each commit
  # pre-push:   unit + integration smoke (excludes slow) — full sanity before pushing
  # CI:         full suite including slow markers (see .github/workflows/)
  - repo: local
    hooks:
      - id: pytest-unit-smoke
        name: pytest (unit smoke, excludes slow)
        entry: uv run pytest tests/unit -m "not slow"
        args: [--tb=short, --maxfail=5]
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-integration-smoke
        name: pytest (unit + integration smoke, excludes slow)
        entry: uv run pytest tests/unit tests/integration -m "not slow"
        args: [--tb=short, --maxfail=5]
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

  # MyPy type checking — re-enabled per Issue #86 with a relaxed config.
  # Runs as a local hook against the project's uv-managed venv so plugins
  # (pydantic.mypy) and runtime deps resolve correctly.
  #
  # Real-bug-class error codes (return / call-arg / var-annotated) are kept on;
  # the disabled codes below are predominantly SQLAlchemy Column[T]-vs-T
  # and Pydantic-schema noise that requires deeper refactors (tracked separately).
  - repo: local
    hooks:
      - id: mypy
        name: mypy (relaxed)
        entry: uv run mypy app/
        language: system
        types: [python]
        pass_filenames: false
        args:
          - --ignore-missing-imports
          - --scripts-are-modules
          - --no-strict-optional
          - --allow-untyped-defs
          - --allow-incomplete-defs
          - --no-warn-return-any
          - --allow-untyped-calls
          - --disable-error-code=arg-type
          - --disable-error-code=assignment
          - --disable-error-code=return-value
          - --disable-error-code=attr-defined
          - --disable-error-code=index
          - --disable-error-code=operator
          - --disable-error-code=call-overload
          - --disable-error-code=method-assign
          - --disable-error-code=valid-type
          - --disable-error-code=type-var
          - --disable-error-code=typeddict-unknown-key
          - --disable-error-code=import-untyped
