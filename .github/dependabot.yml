version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "21:00"  # UTC (JST 6:00 AM)
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Supply-chain cooldown: do not open PRs for releases newer than the window.
    # Security updates bypass cooldown automatically. See docs/dev/DEPENDENCIES.md Section 5
    # and Issue #194.
    cooldown:
      default-days: 7
      semver-major-days: 14
      include:
        - "*"
    groups:
      production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
      dev-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
