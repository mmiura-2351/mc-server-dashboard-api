services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mcdb_test
      POSTGRES_USER: mcuser
      POSTGRES_PASSWORD: mcpassword
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcuser -d mcdb_test"]
      interval: 5s
      timeout: 5s
      retries: 5
